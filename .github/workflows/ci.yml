name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: unit tests + build check + E2E tests
  # ──────────────────────────────────────────────
  test:
    name: Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Create .env first — needed by Vite (build + E2E dev server) and as a
      # safety net in case any module-level import resolves supabase.ts before mocks kick in
      - name: Create .env from secrets
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      # Unit tests — Supabase is fully mocked, no credentials needed
      - name: Unit tests (Vitest)
        run: npm run test:run

      # Verify the TypeScript + Vite build compiles without errors
      - name: Build check (tsc + vite build)
        run: npm run build

      # Cache Playwright browsers between runs to speed up CI
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # E2E tests — connects to real Supabase, data prefixed with "QA" and cleaned up after
      - name: E2E tests (Playwright)
        run: npm run e2e

      # On failure, upload the HTML report as a downloadable artifact
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: deploy to Vercel (only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # vercel pull downloads env vars and project config from Vercel dashboard,
      # vercel build compiles the app locally,
      # vercel deploy --prebuilt uploads the output without rebuilding on Vercel's side
      - name: Build & deploy to Vercel
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
